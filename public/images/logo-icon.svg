<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .logo-text { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    </style>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="10"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- C shape (left arc) -->
  <path d="M 62,100 A 45,45 0 1,1 100,145" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round"/>
  <!-- CKMU grid -->
  <g transform="translate(78, 72)">
    <rect x="0" y="0" width="22" height="22" rx="3" fill="currentColor"/>
    <rect x="25" y="0" width="22" height="22" rx="3" fill="currentColor"/>
    <rect x="0" y="25" width="22" height="22" rx="3" fill="currentColor"/>
    <rect x="25" y="25" width="22" height="22" rx="3" fill="currentColor"/>
    <text x="11" y="16" text-anchor="middle" class="logo-text" fill="black" font-size="13">K</text>
    <text x="36" y="16" text-anchor="middle" class="logo-text" fill="black" font-size="13">M</text>
    <text x="11" y="41" text-anchor="middle" class="logo-text" fill="black" font-size="13">M</text>
    <text x="36" y="41" text-anchor="middle" class="logo-text" fill="black" font-size="13">U</text>
  </g>
</svg>
