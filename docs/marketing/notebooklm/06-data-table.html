          return m[t] || t;

        sort(field) {
          if (this.sortBy === field) this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
          else { this.sortBy = field; this.sortDir = 'asc'; }

        get filtered() {
          let list = this.data;
          if (this.typeFilter !== 'all') list = list.filter(d => d.type === this.typeFilter);
          if (this.search.trim()) {
            const s = this.search.toLowerCase().trim();
            list = list.filter(d =>
              (d.name + ' ' + (d.nameAlt || '') + ' ' + (d.subType || '') + ' ' + (d.takeaway || '') + ' ' + (d.scale || '')).toLowerCase().includes(s)
            );

            const dir = this.sortDir === 'asc' ? 1 : -1;

              const av = (a[this.sortBy] || '').toString();
